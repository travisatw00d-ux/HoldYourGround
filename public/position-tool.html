<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Positioner</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f; color: #eee;
  font-family: 'Segoe UI', system-ui, sans-serif;
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh;
}
.container { display: flex; gap: 32px; align-items: flex-start; padding: 20px; }
canvas { border: 1px solid #333; border-radius: 8px; cursor: grab; background: #fff; }
.controls { display: flex; flex-direction: column; gap: 14px; width: 300px; }
.controls h2 { font-size: 1.2rem; font-weight: 600; }
.note { font-size: 0.75rem; color: #666; line-height: 1.4; }
.slot-row { display: flex; gap: 8px; }
.slot-btn {
  flex: 1; padding: 8px 12px; border-radius: 6px; border: 1px solid #333;
  background: transparent; color: #999; font-size: 0.85rem; cursor: pointer; font-weight: 600;
  transition: all 0.15s;
}
.slot-btn.active { border-color: #4ECDC4; color: #4ECDC4; background: rgba(78,205,196,0.1); }
.slot-btn:hover { border-color: #45b8b0; color: #45b8b0; }
.ctrl-group { display: flex; flex-direction: column; gap: 4px; }
.ctrl-group label { font-size: 0.8rem; color: #999; }
.ctrl-group input[type="range"] { width: 100%; accent-color: #4ECDC4; }
.val { color: #4ECDC4; font-family: monospace; font-size: 0.9rem; }
.output {
  background: #0d0d14; border: 1px solid #333; border-radius: 6px;
  padding: 12px; font-family: monospace; font-size: 0.8rem; line-height: 1.5;
  white-space: pre;
}
.output .num { color: #4ECDC4; }
button {
  background: #4ECDC4; border: none; border-radius: 6px; padding: 10px 20px;
  color: #0a0a0f; font-size: 0.9rem; font-weight: 600; cursor: pointer;
  transition: background 0.15s;
}
button:hover { background: #45b8b0; }
button:active { background: #3ca39c; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
  <canvas id="c" width="800" height="600"></canvas>
  <div class="controls">
    <div class="slot-row">
      <button class="slot-btn active" data-mode="hands">Zombie Hands</button>
      <button class="slot-btn" data-mode="knight">Knight Items</button>
      <button class="slot-btn" data-mode="goblin">Goblin Items</button>
      <button class="slot-btn" data-mode="screen">Server Level</button>
    </div>
    <h2 id="modeTitle">Zombie Hand Positioner</h2>
    <p class="note" id="modeNote">The zombie faces right (→). Drag each hand to position it around the zombie body.</p>

    <div id="handsUI">
      <div class="slot-row">
        <button class="slot-btn active" data-slot="left_hand">Left Hand</button>
        <button class="slot-btn" data-slot="right_hand">Right Hand</button>
      </div>
      <button id="symBtn" style="width:100%;padding:8px 12px;border-radius:6px;border:1px solid #4ECDC4;background:transparent;color:#4ECDC4;font-size:0.85rem;cursor:pointer;font-weight:600;transition:all 0.15s;">Mirror Other Hand</button>
    </div>

    <div id="knightUI" style="display:none">
      <div class="slot-row">
        <button class="slot-btn active" data-slot="knight_sword">Sword</button>
        <button class="slot-btn" data-slot="knight_hand">Left Hand</button>
        <button class="slot-btn" data-slot="knight_right_hand">Right Hand</button>
      </div>
    </div>

    <div id="goblinUI" style="display:none">
      <div class="slot-row">
        <button class="slot-btn active" data-slot="goblin_left_hand">Left Hand</button>
        <button class="slot-btn" data-slot="goblin_sword">Sword</button>
      </div>
    </div>

    <div class="ctrl-group" id="scaleGroup">
      <label>Scale: <span class="val" id="scaleVal">0.05</span></label>
      <input type="range" id="scale" min="0.005" max="1.0" step="0.001" value="0.05">
    </div>

    <div class="ctrl-group" id="rotGroup">
      <label>Rotation: <span class="val" id="rotVal">0.00</span> rad</label>
      <input type="range" id="rotation" min="-3.14" max="3.14" step="0.01" value="0">
    </div>

    <div id="textOffsetGroup" style="display:none">
      <div class="ctrl-group">
        <label>Text Y offset: <span class="val" id="tyVal">0</span></label>
        <input type="range" id="tySlider" min="-100" max="100" step="1" value="0">
      </div>
    </div>

    <div class="output" id="output">Select a mode to begin</div>

    <button id="copyBtn">Copy Config</button>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 800, H = 600;
let CX = W / 2, CY = H / 2;
let mode = 'hands';

const hands = {
  left_hand:  { offsetX: 16, offsetY: -20, scale: 0.230, rotation: -1.55 },
  right_hand: { offsetX: 16, offsetY: 20, scale: 0.230, rotation: -1.55 }
};
let activeHand = 'left_hand';

// Seeded from the live "jab" values in lib/game-data.js / shared/data.js
// KNIGHT_VISUALS as of 2026-07-11, so the tool opens matching what's actually
// on screen in-game instead of stale guesses. Re-sync these if the live
// values drift (there's no automatic fetch — this is a hand-copied snapshot).
const knightItems = {
  knight_sword: { offsetX: 19, offsetY: 37, scale: 0.43, rotation: 1.65 },
  knight_hand:  { offsetX: 28, offsetY: -23, scale: 0.383, rotation: 0.00 },
  // Unarmed look: this fist replaces the sword when the weapon slot is empty
  // (see drawKnightRightHand() in render-entity.js).
  knight_right_hand: { offsetX: 28, offsetY: 23, scale: 0.383, rotation: 3.14 }
};
let activeKnightItem = 'knight_sword';

// Maps a knightItems key to its sprite frame name in KnightSheet.json.
const KNIGHT_FRAME_MAP = {
  knight_sword: 'T1KnightSword.png',
  knight_hand: 'T1KnightLeftHand.png',
  knight_right_hand: 'T1KnightRightHand.png'
};

// Seeded from the live GOBLIN_VISUALS values in lib/game-data.js /
// shared/data.js as of 2026-07-17. Re-sync if the live values drift — same
// hand-copied-snapshot caveat as knightItems above.
const goblinItems = {
  goblin_left_hand: { offsetX: 12, offsetY: -6, scale: 0.24, rotation: -1.3 },
  goblin_sword: { offsetX: 26, offsetY: -4, scale: 0.35, rotation: 0.15 }
};
let activeGoblinItem = 'goblin_left_hand';

// Maps a goblinItems key to its sprite frame name in spritesheet.json.
const GOBLIN_FRAME_MAP = {
  goblin_left_hand: 'GoblinLeftHand.png',
  goblin_sword: 'GoblinSword.png'
};

const screenUI = { x: 53, y: 56, scale: 0.4, ty: 0 };

let dragging = false;
let dragOffX = 0, dragOffY = 0;

const headImg = new Image(); headImg.src = '/images/zombiehead.png';
const leftImg = new Image(); leftImg.src = '/images/zombielefthand.png';
const rightImg = new Image(); rightImg.src = '/images/zombierighthand.png';
const serverLevelImg = new Image(); serverLevelImg.src = '/images/ServerLevel.png';

const knightSheet = new Image();
let knightFrames = null;
knightSheet.src = '/images/KnightSheet.png';
fetch('/images/KnightSheet.json').then(r => r.json()).then(data => { knightFrames = data.frames; if (knightSheet.complete) draw(); });

// Goblin parts live in the main packed atlas (images/spritesheet.png), not a
// dedicated sheet — GoblinHead.png/GoblinLeftHand.png/GoblinSword.png frames.
const goblinSheet = new Image();
let goblinFrames = null;
goblinSheet.src = '/images/spritesheet.png';
fetch('/images/spritesheet.json').then(r => r.json()).then(data => { goblinFrames = data.frames; if (goblinSheet.complete) draw(); });

const _spriteCache = new Map();
function getSpriteFromSheet(sheet, drawW, drawH, frame) {
  drawW = Math.max(1, Math.round(drawW * 2) / 2);
  drawH = Math.max(1, Math.round(drawH * 2) / 2);
  const key = `${frame.x}_${frame.y}_${frame.w}x${frame.h}_${drawW}x${drawH}`;
  let cached = _spriteCache.get(key);
  if (!cached) {
    const m = 2;
    cached = document.createElement('canvas');
    cached.width = Math.round(drawW * m);
    cached.height = Math.round(drawH * m);
    cached.getContext('2d').drawImage(sheet, frame.x, frame.y, frame.w, frame.h, 0, 0, cached.width, cached.height);
    _spriteCache.set(key, cached);
  }
  return cached;
}

let imagesLoaded = 0;
let totalImages = 0;
const allImages = [headImg, leftImg, rightImg, serverLevelImg, knightSheet, goblinSheet];
allImages.forEach(img => { totalImages++; img.onload = () => { imagesLoaded++; if (imagesLoaded >= totalImages) draw(); }; img.onerror = () => { imagesLoaded++; if (imagesLoaded >= totalImages) draw(); }; });
setTimeout(draw, 1000);

const scaleSlider = document.getElementById('scale');
const rotSlider = document.getElementById('rotation');
const scaleVal = document.getElementById('scaleVal');
const rotVal = document.getElementById('rotVal');
const tySlider = document.getElementById('tySlider');
const tyVal = document.getElementById('tyVal');
const textOffsetGroup = document.getElementById('textOffsetGroup');
const output = document.getElementById('output');
const copyBtn = document.getElementById('copyBtn');
const modeTitle = document.getElementById('modeTitle');
const modeNote = document.getElementById('modeNote');
const handsUI = document.getElementById('handsUI');
const knightUI = document.getElementById('knightUI');
const goblinUI = document.getElementById('goblinUI');

document.getElementById('symBtn').addEventListener('click', () => {
  const otherKey = activeHand === 'left_hand' ? 'right_hand' : 'left_hand';
  const other = hands[otherKey];
  const current = hands[activeHand];
  current.offsetX = other.offsetX;
  current.offsetY = -other.offsetY;
  current.scale = other.scale;
  current.rotation = other.rotation;
  scaleSlider.value = current.scale;
  rotSlider.value = current.rotation;
  draw();
});

document.querySelectorAll('[data-slot]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-slot]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const slot = btn.dataset.slot;
    if (slot === 'left_hand' || slot === 'right_hand') {
      activeHand = slot;
      const nh = hands[activeHand];
      scaleSlider.value = nh.scale;
      rotSlider.value = nh.rotation;
    } else if (slot === 'goblin_left_hand' || slot === 'goblin_sword') {
      activeGoblinItem = slot;
      const item = goblinItems[activeGoblinItem];
      scaleSlider.value = item.scale;
      rotSlider.value = item.rotation;
    } else {
      activeKnightItem = slot;
      const item = knightItems[activeKnightItem];
      scaleSlider.value = item.scale;
      rotSlider.value = item.rotation;
    }
    draw();
  });
});

document.querySelectorAll('[data-mode]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-mode]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;

    if (mode === 'screen') {
      W = 800; H = 600; CX = W / 2; CY = H / 2;
      canvas.width = W; canvas.height = H;
      modeTitle.textContent = 'Server Level Positioner';
      modeNote.textContent = 'Drag the icon. Use X/Y sliders to position the text relative to the icon center.';
      handsUI.style.display = 'none';
      knightUI.style.display = 'none';
      goblinUI.style.display = 'none';
      document.getElementById('rotGroup').style.display = 'none';
      textOffsetGroup.style.display = '';
      scaleSlider.min = '0.1'; scaleSlider.max = '3'; scaleSlider.step = '0.1';
      scaleSlider.value = screenUI.scale;
      tySlider.value = screenUI.ty;
    } else if (mode === 'knight') {
      W = 400; H = 400; CX = W / 2; CY = H / 2;
      canvas.width = W; canvas.height = H;
      modeTitle.textContent = 'Knight Item Positioner';
      modeNote.textContent = 'The player faces right (→). Drag the sword and hand to position them around the player body.';
      handsUI.style.display = 'none';
      knightUI.style.display = '';
      goblinUI.style.display = 'none';
      document.getElementById('rotGroup').style.display = '';
      textOffsetGroup.style.display = 'none';
      scaleSlider.min = '0.005'; scaleSlider.max = '1.0'; scaleSlider.step = '0.001';
      const item = knightItems[activeKnightItem];
      scaleSlider.value = item.scale;
      rotSlider.value = item.rotation;
    } else if (mode === 'goblin') {
      W = 400; H = 400; CX = W / 2; CY = H / 2;
      canvas.width = W; canvas.height = H;
      modeTitle.textContent = 'Goblin Item Positioner';
      modeNote.textContent = 'The goblin faces right (→). Drag the sword and hand to position them around the goblin body. This is the idle/jab-start pose — the attack animation thrusts forward from here.';
      handsUI.style.display = 'none';
      knightUI.style.display = 'none';
      goblinUI.style.display = '';
      document.getElementById('rotGroup').style.display = '';
      textOffsetGroup.style.display = 'none';
      scaleSlider.min = '0.005'; scaleSlider.max = '1.0'; scaleSlider.step = '0.001';
      const item = goblinItems[activeGoblinItem];
      scaleSlider.value = item.scale;
      rotSlider.value = item.rotation;
    } else {
      W = 400; H = 400; CX = W / 2; CY = H / 2;
      canvas.width = W; canvas.height = H;
      modeTitle.textContent = 'Zombie Hand Positioner';
      modeNote.textContent = 'The zombie faces right (→). Drag each hand to position it around the zombie body.';
      handsUI.style.display = '';
      knightUI.style.display = 'none';
      goblinUI.style.display = 'none';
      document.getElementById('rotGroup').style.display = '';
      textOffsetGroup.style.display = 'none';
      scaleSlider.min = '0.005'; scaleSlider.max = '0.3'; scaleSlider.step = '0.001';
      const ah = hands[activeHand];
      scaleSlider.value = ah.scale;
      rotSlider.value = ah.rotation;
    }
    draw();
  });
});

function draw() {
  ctx.clearRect(0, 0, W, H);

  if (mode === 'hands') {
    drawHandsMode();
  } else if (mode === 'knight') {
    drawKnightMode();
  } else if (mode === 'goblin') {
    drawGoblinMode();
  } else {
    drawScreenMode();
  }
}

function drawGrid(cx, cy, cellSize, w, h) {
  ctx.strokeStyle = 'rgba(0,0,0,0.04)'; ctx.lineWidth = 1;
  for (let x = 0; x <= w; x += cellSize) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
  for (let y = 0; y <= h; y += cellSize) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }

  ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 6]);
  ctx.beginPath(); ctx.moveTo(cx + 10, cy); ctx.lineTo(cx + 80, cy); ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.moveTo(cx + 80, cy); ctx.lineTo(cx + 73, cy - 4); ctx.moveTo(cx + 80, cy); ctx.lineTo(cx + 73, cy + 4); ctx.stroke();

  ctx.strokeStyle = 'rgba(0,0,0,0.08)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx - 28, cy); ctx.lineTo(cx + 28, cy); ctx.moveTo(cx, cy - 28); ctx.lineTo(cx, cy + 28); ctx.stroke();
}

function drawKnightMode() {
  const CX = W / 2, CY = H / 2;

  drawGrid(CX, CY, 40, W, H);

  // player body (circle)
  ctx.beginPath(); ctx.arc(CX, CY, 20, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(78, 205, 196, 0.15)'; ctx.fill();
  ctx.strokeStyle = 'rgba(78, 205, 196, 0.3)'; ctx.lineWidth = 1.5; ctx.stroke();

  // Knight head — same 56px-box formula as drawPlayer() in render-entity.js,
  // using frame.w/h (trimmed) not sourceSize so the aspect ratio passed to
  // getSpriteFromSheet always matches (see position-tool.html gotcha in
  // Workflow/editing-client.md for why sourceSize causes distortion here).
  const headFrame = knightFrames ? knightFrames['T1KnightHead.png'] : null;
  if (headFrame) {
    const hsz = 56 / Math.max(headFrame.frame.w, headFrame.frame.h);
    const hw = headFrame.frame.w * hsz;
    const hh = headFrame.frame.h * hsz;
    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(-Math.PI / 2);
    ctx.drawImage(getSpriteFromSheet(knightSheet, hw, hh, headFrame.frame), -hw / 2, -hh / 2, hw, hh);
    ctx.restore();
  }

  // Knight sword
  const ks = knightItems.knight_sword;
  const isSwordActive = activeKnightItem === 'knight_sword';
  const swordFrame = knightFrames ? knightFrames['T1KnightSword.png'] : null;
  if (swordFrame) {
    const sw = swordFrame.frame.w * ks.scale;
    const sh = swordFrame.frame.h * ks.scale;
    ctx.save();
    ctx.globalAlpha = isSwordActive ? 1 : 0.25;
    ctx.translate(CX + ks.offsetX, CY + ks.offsetY);
    ctx.rotate(ks.rotation);
    ctx.drawImage(getSpriteFromSheet(knightSheet, sw, sh, swordFrame.frame), -sw / 2, -sh / 2, sw, sh);
    ctx.restore();
  }
  ctx.fillStyle = isSwordActive ? 'rgba(78,205,196,0.8)' : 'rgba(255,255,255,0.2)';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('sword', CX + ks.offsetX, CY + ks.offsetY + 30);

  // Knight hand
  const kh = knightItems.knight_hand;
  const isHandActive = activeKnightItem === 'knight_hand';
  const handFrame = knightFrames ? knightFrames['T1KnightLeftHand.png'] : null;
  if (handFrame) {
    const sw = handFrame.frame.w * kh.scale;
    const sh = handFrame.frame.h * kh.scale;
    ctx.save();
    ctx.globalAlpha = isHandActive ? 1 : 0.25;
    ctx.translate(CX + kh.offsetX, CY + kh.offsetY);
    ctx.rotate(kh.rotation);
    ctx.drawImage(getSpriteFromSheet(knightSheet, sw, sh, handFrame.frame), -sw / 2, -sh / 2, sw, sh);
    ctx.restore();
  }
  ctx.fillStyle = isHandActive ? 'rgba(78,205,196,0.8)' : 'rgba(255,255,255,0.2)';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('hand', CX + kh.offsetX, CY + kh.offsetY + 30);

  // Knight right hand (unarmed fist — replaces the sword when unequipped)
  const krh = knightItems.knight_right_hand;
  const isRightHandActive = activeKnightItem === 'knight_right_hand';
  const rightHandFrame = knightFrames ? knightFrames['T1KnightRightHand.png'] : null;
  if (rightHandFrame) {
    const sw = rightHandFrame.frame.w * krh.scale;
    const sh = rightHandFrame.frame.h * krh.scale;
    ctx.save();
    ctx.globalAlpha = isRightHandActive ? 1 : 0.25;
    ctx.translate(CX + krh.offsetX, CY + krh.offsetY);
    ctx.rotate(krh.rotation);
    ctx.drawImage(getSpriteFromSheet(knightSheet, sw, sh, rightHandFrame.frame), -sw / 2, -sh / 2, sw, sh);
    ctx.restore();
  }
  ctx.fillStyle = isRightHandActive ? 'rgba(78,205,196,0.8)' : 'rgba(255,255,255,0.2)';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('right hand', CX + krh.offsetX, CY + krh.offsetY + 30);

  const item = knightItems[activeKnightItem];
  scaleVal.textContent = item.scale.toFixed(3);
  rotVal.textContent = item.rotation.toFixed(2);

  output.textContent =
    `// Paste into game-data.js/shared/data.js → KNIGHT_VISUALS\n` +
    `knight_sword: {\n  offsetX: ${knightItems.knight_sword.offsetX},\n  offsetY: ${knightItems.knight_sword.offsetY},\n  scale: ${knightItems.knight_sword.scale.toFixed(3)},\n  rotation: ${knightItems.knight_sword.rotation.toFixed(2)}\n},\n` +
    `knight_hand: {\n  offsetX: ${knightItems.knight_hand.offsetX},\n  offsetY: ${knightItems.knight_hand.offsetY},\n  scale: ${knightItems.knight_hand.scale.toFixed(3)},\n  rotation: ${knightItems.knight_hand.rotation.toFixed(2)}\n},\n` +
    `knight_right_hand: {\n  offsetX: ${knightItems.knight_right_hand.offsetX},\n  offsetY: ${knightItems.knight_right_hand.offsetY},\n  scale: ${knightItems.knight_right_hand.scale.toFixed(3)},\n  rotation: ${knightItems.knight_right_hand.rotation.toFixed(2)}\n}`;
}

function drawGoblinMode() {
  const CX = W / 2, CY = H / 2;

  drawGrid(CX, CY, 40, W, H);

  // goblin body (circle)
  ctx.beginPath(); ctx.arc(CX, CY, 20, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(120, 200, 90, 0.15)'; ctx.fill();
  ctx.strokeStyle = 'rgba(120, 200, 90, 0.35)'; ctx.lineWidth = 1.5; ctx.stroke();

  // Goblin head — same 40px-box formula as drawZombie() in render-entity.js
  // for the zombie/troll heads (goblin uses the same headScale=1.0 path).
  const headFrame = goblinFrames ? goblinFrames['GoblinHead.png'] : null;
  if (headFrame) {
    const hsz = 40 / Math.max(headFrame.frame.w, headFrame.frame.h);
    const hw = headFrame.frame.w * hsz;
    const hh = headFrame.frame.h * hsz;
    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(-Math.PI / 2);
    ctx.drawImage(getSpriteFromSheet(goblinSheet, hw, hh, headFrame.frame), -hw / 2, -hh / 2, hw, hh);
    ctx.restore();
  }

  // Goblin sword
  const gs = goblinItems.goblin_sword;
  const isSwordActive = activeGoblinItem === 'goblin_sword';
  const swordFrame = goblinFrames ? goblinFrames['GoblinSword.png'] : null;
  if (swordFrame) {
    const sw = swordFrame.frame.w * gs.scale;
    const sh = swordFrame.frame.h * gs.scale;
    ctx.save();
    ctx.globalAlpha = isSwordActive ? 1 : 0.25;
    ctx.translate(CX + gs.offsetX, CY + gs.offsetY);
    ctx.rotate(gs.rotation);
    ctx.drawImage(getSpriteFromSheet(goblinSheet, sw, sh, swordFrame.frame), -sw / 2, -sh / 2, sw, sh);
    ctx.restore();
  }
  ctx.fillStyle = isSwordActive ? 'rgba(78,205,196,0.8)' : 'rgba(255,255,255,0.2)';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('sword', CX + gs.offsetX, CY + gs.offsetY + 30);

  // Goblin left hand
  const gh = goblinItems.goblin_left_hand;
  const isHandActive = activeGoblinItem === 'goblin_left_hand';
  const handFrame = goblinFrames ? goblinFrames['GoblinLeftHand.png'] : null;
  if (handFrame) {
    const sw = handFrame.frame.w * gh.scale;
    const sh = handFrame.frame.h * gh.scale;
    ctx.save();
    ctx.globalAlpha = isHandActive ? 1 : 0.25;
    ctx.translate(CX + gh.offsetX, CY + gh.offsetY);
    ctx.rotate(gh.rotation);
    ctx.drawImage(getSpriteFromSheet(goblinSheet, sw, sh, handFrame.frame), -sw / 2, -sh / 2, sw, sh);
    ctx.restore();
  }
  ctx.fillStyle = isHandActive ? 'rgba(78,205,196,0.8)' : 'rgba(255,255,255,0.2)';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('hand', CX + gh.offsetX, CY + gh.offsetY + 30);

  const item = goblinItems[activeGoblinItem];
  scaleVal.textContent = item.scale.toFixed(3);
  rotVal.textContent = item.rotation.toFixed(2);

  output.textContent =
    `// Paste into game-data.js/shared/data.js → GOBLIN_VISUALS (and as\n` +
    `// keyframe[0] of GOBLIN_ANIMATIONS.attack.left_hand / .sword)\n` +
    `left_hand: {\n  offsetX: ${goblinItems.goblin_left_hand.offsetX},\n  offsetY: ${goblinItems.goblin_left_hand.offsetY},\n  scale: ${goblinItems.goblin_left_hand.scale.toFixed(3)},\n  rotation: ${goblinItems.goblin_left_hand.rotation.toFixed(2)}\n},\n` +
    `sword: {\n  offsetX: ${goblinItems.goblin_sword.offsetX},\n  offsetY: ${goblinItems.goblin_sword.offsetY},\n  scale: ${goblinItems.goblin_sword.scale.toFixed(3)},\n  rotation: ${goblinItems.goblin_sword.rotation.toFixed(2)}\n}`;
}

function drawHandsMode() {
  const CX = W / 2, CY = H / 2;

  drawGrid(CX, CY, 40, W, H);

  ctx.beginPath(); ctx.arc(CX, CY, 20, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(200,60,60,0.15)'; ctx.fill();
  ctx.strokeStyle = 'rgba(200,60,60,0.3)'; ctx.lineWidth = 1.5; ctx.stroke();

  if (headImg.complete && headImg.naturalWidth > 0) {
    const hsz = 40 / Math.max(headImg.naturalWidth, headImg.naturalHeight);
    const hw = headImg.naturalWidth * hsz;
    const hh = headImg.naturalHeight * hsz;
    ctx.save();
    ctx.translate(CX, CY);
    ctx.rotate(-Math.PI / 2);
    ctx.drawImage(headImg, -hw / 2, -hh / 2, hw, hh);
    ctx.restore();
  }

  for (const key of ['left_hand', 'right_hand']) {
    const h = hands[key];
    const img = key === 'left_hand' ? leftImg : rightImg;
    const isActive = key === activeHand;
    if (img.complete && img.naturalWidth > 0) {
      const sw = img.naturalWidth * h.scale;
      const sh = img.naturalHeight * h.scale;
      ctx.save();
      ctx.globalAlpha = isActive ? 1 : 0.25;
      ctx.translate(CX + h.offsetX, CY + h.offsetY);
      ctx.rotate(h.rotation);
      ctx.drawImage(img, -sw / 2, -sh / 2, sw, sh);
      ctx.restore();
    }
    ctx.fillStyle = isActive ? 'rgba(78,205,196,0.8)' : 'rgba(255,255,255,0.2)';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(key.replace('_', ' '), CX + h.offsetX, CY + h.offsetY + 30);
  }

  const ah = hands[activeHand];
  scaleVal.textContent = ah.scale.toFixed(3);
  rotVal.textContent = ah.rotation.toFixed(2);

  output.textContent =
    `// Paste into shared/data.js → ZOMBIE_VISUALS\n` +
    `left_hand: {\n  offsetX: ${hands.left_hand.offsetX},\n  offsetY: ${hands.left_hand.offsetY},\n  scale: ${hands.left_hand.scale.toFixed(3)},\n  rotation: ${hands.left_hand.rotation.toFixed(2)}\n},\n` +
    `right_hand: {\n  offsetX: ${hands.right_hand.offsetX},\n  offsetY: ${hands.right_hand.offsetY},\n  scale: ${hands.right_hand.scale.toFixed(3)},\n  rotation: ${hands.right_hand.rotation.toFixed(2)}\n}`;
}

function drawScreenMode() {
  ctx.strokeStyle = 'rgba(0,0,0,0.04)'; ctx.lineWidth = 1;
  for (let x = 0; x <= W; x += 80) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y <= H; y += 80) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 2;
  ctx.strokeRect(0, 0, W, H);

  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.font = '11px monospace'; ctx.textAlign = 'left';
  ctx.fillText('800×600 viewport', 10, 20);

  const ui = screenUI;
  if (serverLevelImg.complete && serverLevelImg.naturalWidth > 0) {
    const sw = serverLevelImg.naturalWidth * ui.scale;
    const sh = serverLevelImg.naturalHeight * ui.scale;
    ctx.save();
    ctx.translate(ui.x, ui.y);
    ctx.drawImage(serverLevelImg, -sw / 2, -sh / 2, sw, sh);
    ctx.restore();

    ctx.strokeStyle = 'rgba(78,205,196,0.4)'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]);
    ctx.strokeRect(ui.x - sw / 2, ui.y - sh / 2, sw, sh);
    ctx.setLineDash([]);
  }

  const tx = ui.x, ty = ui.y + ui.ty;
  ctx.font = '32px "Lilita One", "Segoe UI", sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineJoin = 'round';
  ctx.miterLimit = 2;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillText('12', tx + 2, ty + 3);
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 10;
  ctx.strokeText('12', tx, ty);
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;
  ctx.strokeText('12', tx - 1, ty - 1);
  const grad = ctx.createLinearGradient(tx, ty - 16, tx, ty + 16);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(1, '#b0b0b0');
  ctx.fillStyle = grad;
  ctx.fillText('12', tx, ty);
  ctx.strokeStyle = 'rgba(78,205,196,0.2)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(ui.x, 0); ctx.lineTo(ui.x, H); ctx.stroke();
  ctx.setLineDash([]);

  scaleVal.textContent = ui.scale.toFixed(1);
  rotVal.textContent = '\u2014';
  tyVal.textContent = ui.ty;

  output.textContent =
    `// Paste into shared/data.js \u2192 SCREEN_UI\n` +
    `serverLevel: {\n  x: ${ui.x},\n  y: ${ui.y},\n  scale: ${ui.scale.toFixed(1)},\n  ty: ${ui.ty}\n}`;
}

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  return { x: (e.clientX - r.left) * (W / r.width), y: (e.clientY - r.top) * (H / r.height) };
}

canvas.addEventListener('mousedown', (e) => {
  const p = getPos(e);
  if (mode === 'screen') {
    const ui = screenUI;
    const sz = serverLevelImg.complete ? Math.max(serverLevelImg.naturalWidth, serverLevelImg.naturalHeight) * ui.scale : 60;
    const dx = p.x - ui.x;
    const dy = p.y - ui.y;
    if (Math.sqrt(dx * dx + dy * dy) < sz / 2 + 15) {
      dragging = true;
      dragOffX = dx;
      dragOffY = dy;
      canvas.style.cursor = 'grabbing';
    }
  } else if (mode === 'knight') {
    const item = knightItems[activeKnightItem];
    const frameKey = KNIGHT_FRAME_MAP[activeKnightItem];
    const frame = knightFrames ? knightFrames[frameKey] : null;
    const sz = frame ? Math.max(frame.frame.w, frame.frame.h) * item.scale : 30;
    const dx = p.x - (CX + item.offsetX);
    const dy = p.y - (CY + item.offsetY);
    if (Math.sqrt(dx * dx + dy * dy) < sz / 2 + 20) {
      dragging = true;
      dragOffX = dx;
      dragOffY = dy;
      canvas.style.cursor = 'grabbing';
    }
  } else if (mode === 'goblin') {
    const item = goblinItems[activeGoblinItem];
    const frameKey = GOBLIN_FRAME_MAP[activeGoblinItem];
    const frame = goblinFrames ? goblinFrames[frameKey] : null;
    const sz = frame ? Math.max(frame.frame.w, frame.frame.h) * item.scale : 30;
    const dx = p.x - (CX + item.offsetX);
    const dy = p.y - (CY + item.offsetY);
    if (Math.sqrt(dx * dx + dy * dy) < sz / 2 + 20) {
      dragging = true;
      dragOffX = dx;
      dragOffY = dy;
      canvas.style.cursor = 'grabbing';
    }
  } else {
    const h = hands[activeHand];
    const img = activeHand === 'left_hand' ? leftImg : rightImg;
    const size = Math.max(img.naturalWidth, img.naturalHeight) * h.scale;
    const dx = p.x - (CX + h.offsetX);
    const dy = p.y - (CY + h.offsetY);
    if (Math.sqrt(dx * dx + dy * dy) < size / 2 + 20) {
      dragging = true;
      dragOffX = dx;
      dragOffY = dy;
      canvas.style.cursor = 'grabbing';
    }
  }
});

canvas.addEventListener('mousemove', (e) => {
  const p = getPos(e);
  if (dragging) {
    if (mode === 'screen') {
      screenUI.x = Math.round(p.x - dragOffX);
      screenUI.y = Math.round(p.y - dragOffY);
    } else if (mode === 'knight') {
      const item = knightItems[activeKnightItem];
      item.offsetX = Math.round(p.x - W / 2 - dragOffX);
      item.offsetY = Math.round(p.y - H / 2 - dragOffY);
    } else if (mode === 'goblin') {
      const item = goblinItems[activeGoblinItem];
      item.offsetX = Math.round(p.x - W / 2 - dragOffX);
      item.offsetY = Math.round(p.y - H / 2 - dragOffY);
    } else {
      const h = hands[activeHand];
      h.offsetX = Math.round(p.x - W / 2 - dragOffX);
      h.offsetY = Math.round(p.y - H / 2 - dragOffY);
    }
    draw();
  } else {
    if (mode === 'screen') {
      const ui = screenUI;
      const sz = serverLevelImg.complete ? Math.max(serverLevelImg.naturalWidth, serverLevelImg.naturalHeight) * ui.scale : 60;
      const dx = p.x - ui.x;
      const dy = p.y - ui.y;
      canvas.style.cursor = Math.sqrt(dx * dx + dy * dy) < sz / 2 + 15 ? 'grab' : 'default';
    } else if (mode === 'knight') {
      const item = knightItems[activeKnightItem];
      const frameKey = KNIGHT_FRAME_MAP[activeKnightItem];
      const frame = knightFrames ? knightFrames[frameKey] : null;
      const sz = frame ? Math.max(frame.frame.w, frame.frame.h) * item.scale : 30;
      const dx = p.x - (W / 2 + item.offsetX);
      const dy = p.y - (H / 2 + item.offsetY);
      canvas.style.cursor = Math.sqrt(dx * dx + dy * dy) < sz / 2 + 20 ? 'grab' : 'default';
    } else if (mode === 'goblin') {
      const item = goblinItems[activeGoblinItem];
      const frameKey = GOBLIN_FRAME_MAP[activeGoblinItem];
      const frame = goblinFrames ? goblinFrames[frameKey] : null;
      const sz = frame ? Math.max(frame.frame.w, frame.frame.h) * item.scale : 30;
      const dx = p.x - (W / 2 + item.offsetX);
      const dy = p.y - (H / 2 + item.offsetY);
      canvas.style.cursor = Math.sqrt(dx * dx + dy * dy) < sz / 2 + 20 ? 'grab' : 'default';
    } else {
      const h = hands[activeHand];
      const img = activeHand === 'left_hand' ? leftImg : rightImg;
      const size = Math.max(img.naturalWidth, img.naturalHeight) * h.scale;
      const dx = p.x - (W / 2 + h.offsetX);
      const dy = p.y - (H / 2 + h.offsetY);
      canvas.style.cursor = Math.sqrt(dx * dx + dy * dy) < size / 2 + 20 ? 'grab' : 'default';
    }
  }
});

canvas.addEventListener('mouseup', () => { dragging = false; canvas.style.cursor = 'default'; });
canvas.addEventListener('mouseleave', () => { dragging = false; canvas.style.cursor = 'default'; });

scaleSlider.addEventListener('input', () => {
  if (mode === 'screen') {
    screenUI.scale = parseFloat(scaleSlider.value);
  } else if (mode === 'knight') {
    knightItems[activeKnightItem].scale = parseFloat(scaleSlider.value);
  } else if (mode === 'goblin') {
    goblinItems[activeGoblinItem].scale = parseFloat(scaleSlider.value);
  } else {
    hands[activeHand].scale = parseFloat(scaleSlider.value);
  }
  draw();
});
rotSlider.addEventListener('input', () => {
  if (mode === 'knight') {
    knightItems[activeKnightItem].rotation = parseFloat(rotSlider.value);
  } else if (mode === 'goblin') {
    goblinItems[activeGoblinItem].rotation = parseFloat(rotSlider.value);
  } else if (mode !== 'screen') {
    hands[activeHand].rotation = parseFloat(rotSlider.value);
  }
  draw();
});
tySlider.addEventListener('input', () => {
  if (mode === 'screen') { screenUI.ty = parseInt(tySlider.value); tyVal.textContent = screenUI.ty; }
  draw();
});

copyBtn.addEventListener('click', () => {
  let text;
  if (mode === 'screen') {
    text = `// SCREEN_UI\nserverLevel: {\n  x: ${screenUI.x},\n  y: ${screenUI.y},\n  scale: ${screenUI.scale.toFixed(1)},\n  ty: ${screenUI.ty}\n}`;
  } else if (mode === 'knight') {
    text = `// KNIGHT_VISUALS\nknight_sword: {\n  offsetX: ${knightItems.knight_sword.offsetX},\n  offsetY: ${knightItems.knight_sword.offsetY},\n  scale: ${knightItems.knight_sword.scale.toFixed(3)},\n  rotation: ${knightItems.knight_sword.rotation.toFixed(2)}\n},\nknight_hand: {\n  offsetX: ${knightItems.knight_hand.offsetX},\n  offsetY: ${knightItems.knight_hand.offsetY},\n  scale: ${knightItems.knight_hand.scale.toFixed(3)},\n  rotation: ${knightItems.knight_hand.rotation.toFixed(2)}\n},\nknight_right_hand: {\n  offsetX: ${knightItems.knight_right_hand.offsetX},\n  offsetY: ${knightItems.knight_right_hand.offsetY},\n  scale: ${knightItems.knight_right_hand.scale.toFixed(3)},\n  rotation: ${knightItems.knight_right_hand.rotation.toFixed(2)}\n}`;
  } else if (mode === 'goblin') {
    text = `// GOBLIN_VISUALS (also use as keyframe[0] of GOBLIN_ANIMATIONS.attack)\nleft_hand: {\n  offsetX: ${goblinItems.goblin_left_hand.offsetX},\n  offsetY: ${goblinItems.goblin_left_hand.offsetY},\n  scale: ${goblinItems.goblin_left_hand.scale.toFixed(3)},\n  rotation: ${goblinItems.goblin_left_hand.rotation.toFixed(2)}\n},\nsword: {\n  offsetX: ${goblinItems.goblin_sword.offsetX},\n  offsetY: ${goblinItems.goblin_sword.offsetY},\n  scale: ${goblinItems.goblin_sword.scale.toFixed(3)},\n  rotation: ${goblinItems.goblin_sword.rotation.toFixed(2)}\n}`;
  } else {
    text = `// ZOMBIE_VISUALS\nleft_hand: {\n  offsetX: ${hands.left_hand.offsetX},\n  offsetY: ${hands.left_hand.offsetY},\n  scale: ${hands.left_hand.scale.toFixed(3)},\n  rotation: ${hands.left_hand.rotation.toFixed(2)}\n},\nright_hand: {\n  offsetX: ${hands.right_hand.offsetX},\n  offsetY: ${hands.right_hand.offsetY},\n  scale: ${hands.right_hand.scale.toFixed(3)},\n  rotation: ${hands.right_hand.rotation.toFixed(2)}\n}`;
  }
  navigator.clipboard.writeText(text);
  copyBtn.textContent = 'Copied!';
  setTimeout(() => { copyBtn.textContent = 'Copy Config'; }, 2000);
});

draw();
</script>
</body>
</html>
